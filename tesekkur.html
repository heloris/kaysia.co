<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Teşekkürler - Kaysia Agency</title>
  <meta name="description" content="Projeniz alındı. En kısa sürede sizinle iletişime geçeceğiz.">
  <link rel="icon" href="favicon-light.svg" id="favicon">

  <!-- GA4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-CYM7YXN4S0"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-CYM7YXN4S0');
  </script>



  <style>
    :root{
      --bg:#ffffff; --fg:#1a1a1a; --muted:#666666; --card:#ffffff; --border:#e5e5e5;
      --blue:#e74c3c; --accent:#2c3e50; --red:#e74c3c;
    }
    
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,Arial,sans-serif;color:var(--fg);background:linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);min-height:100vh;display:flex;align-items:center;justify-content:center}
    .container{max-width:700px;margin:0 auto;padding:60px 40px;text-align:center;background:linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);border-radius:30px;box-shadow:0 20px 60px rgba(0,0,0,0.1);border:2px solid rgba(231, 76, 60, 0.1)}
    
    .logo{display:flex;align-items:center;gap:15px;justify-content:center;margin-bottom:50px}
    .logo-icon{position:relative}
    .logo-icon svg{width:50px;height:50px;filter:drop-shadow(0 2px 4px rgba(231, 76, 60, 0.2))}
    .logo-text{font-size:28px;font-weight:700;background:linear-gradient(135deg, #e74c3c, #2c3e50);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-0.5px}
    
    .success-icon{font-size:100px;margin-bottom:30px;animation:bounce 2s infinite}
    @keyframes bounce{0%,20%,50%,80%,100%{transform:translateY(0)}40%{transform:translateY(-20px)}60%{transform:translateY(-10px)}}
    
    h1{font-size:clamp(28px, 5vw, 48px);line-height:1.1;margin:0 0 25px;background:linear-gradient(135deg, #2c3e50, #e74c3c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:800}
    
    p{color:var(--muted);font-size:clamp(16px, 2.5vw, 20px);margin:0 0 40px;line-height:1.6}
    
    .btn{background:linear-gradient(135deg, var(--blue), var(--accent));color:#fff;border-radius:50px;padding:18px 36px;text-decoration:none;font-weight:700;transition:all 0.3s;display:inline-block;box-shadow:0 8px 25px rgba(231, 76, 60, 0.4);font-size:18px}
    .btn:hover{transform:translateY(-3px);box-shadow:0 12px 35px rgba(231, 76, 60, 0.5)}
    
    .muted{color:var(--muted);font-size:16px;margin-top:30px}
    .muted a{color:var(--blue);text-decoration:none;font-weight:600}
    .muted a:hover{text-decoration:underline}
    
    /* Mobile responsiveness */
    @media(max-width:768px){
      .container{padding:40px 25px;margin:20px;border-radius:20px}
      .success-icon{font-size:80px;margin-bottom:25px}
      .logo{margin-bottom:40px}
      .logo-icon svg{width:40px;height:40px}
      .logo-text{font-size:22px}
      .btn{padding:16px 28px;font-size:16px}
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-icon">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <text x="20" y="28" text-anchor="middle" font-family="serif" font-size="32" font-weight="bold" fill="currentColor">K</text>
          <circle cx="12" cy="18" r="4" fill="#e74c3c"/>
        </svg>
      </div>
      <span class="logo-text">Kaysia Agency</span>
    </div>
    
    <div class="success-icon">✅</div>
    <h1>Projeniz Alındı!</h1>
    <p>Teşekkürler! Proje talebiniz başarıyla iletildi. En kısa sürede sizinle iletişime geçeceğiz.</p>
    
    <a href="/" class="btn">Ana Sayfaya Dön</a>
    
    <p class="muted">
      Acil durumlar için: <a href="https://wa.me/905457705297" target="_blank" rel="noopener">WhatsApp</a>
    </p>
  </div>

  <script>
    // GA4 event tracking
    if(window.gtag){
      gtag('event','form_success',{event_category:'form',event_label:'thank_you_page'});
    }
  </script>

  <script>
    // Tema switcher için favicon değiştirme
    function setFavicon(theme) {
      const favicon = document.getElementById('favicon');
      if (theme === 'dark') {
        favicon.href = 'favicon-dark.svg';
      } else {
        favicon.href = 'favicon-light.svg';
      }
    }
    
    // Sayfa yüklendiğinde light tema favicon'u kullan
    setFavicon('light');
  </script>

</body>
</html>
