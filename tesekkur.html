  <style>
    :root{

      --blue:#e74c3c; --accent:#2c3e50; --red:#e74c3c;
    }
    
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,Arial,sans-serif;color:var(--fg);background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center}

    .logo{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:40px}
    .logo-icon{position:relative}
    .logo-icon svg{width:40px;height:40px}
    .logo-text{font-size:24px;font-weight:700;color:var(--fg)}
    .success-icon{font-size:80px;margin-bottom:20px}
    h1{font-size:36px;line-height:1.15;margin:0 0 20px;color:var(--blue)}
    p{color:var(--muted);font-size:18px;margin:0 0 30px;line-height:1.6}
    .btn{background:var(--blue);color:#fff;border-radius:8px;padding:12px 24px;text-decoration:none;font-weight:600;transition:all 0.2s;display:inline-block}
    .btn:hover{background:var(--accent);transform:translateY(-1px)}
    .muted{color:var(--muted);font-size:14px;margin-top:20px}

  <script>
    // Tema switcher için favicon değiştirme
    function setFavicon(theme) {
      const favicon = document.getElementById('favicon');
      if (theme === 'dark') {
        favicon.href = 'favicon-dark.svg';
      } else {
        favicon.href = 'favicon-light.svg';
      }
    }
    
    // Sayfa yüklendiğinde light tema favicon'u kullan
    setFavicon('light');
  </script>
