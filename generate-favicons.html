<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Generate Favicons</title>
</head>
<body>
    <h1>Generating Favicons...</h1>
    <script>
        function createFavicon(size, filename) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            // White background
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, size, size);
            
            // Create gradient
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#2563eb');
            gradient.addColorStop(1, '#1e40af');
            
            // Set font and style
            ctx.font = `bold ${size * 0.6}px Inter, Arial, sans-serif`;
            ctx.fillStyle = gradient;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // Add subtle shadow
            ctx.shadowColor = 'rgba(0, 0, 0, 0.1)';
            ctx.shadowBlur = size * 0.05;
            ctx.shadowOffsetX = size * 0.02;
            ctx.shadowOffsetY = size * 0.02;
            
            // Draw the text
            ctx.fillText('k.', size / 2, size / 2);
            
            // Convert to blob and download
            canvas.toBlob(function(blob) {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 'image/png');
        }
        
        // Generate all favicon sizes
        createFavicon(16, 'favicon-16.png');
        setTimeout(() => createFavicon(32, 'favicon.png'), 100);
        setTimeout(() => createFavicon(64, 'favicon-64.png'), 200);
        setTimeout(() => createFavicon(180, 'apple-touch-icon.png'), 300);
        
        setTimeout(() => {
            document.body.innerHTML = '<h1>Favicons Generated!</h1><p>Please save the downloaded files in your project folder.</p>';
        }, 1000);
    </script>
</body>
</html>
