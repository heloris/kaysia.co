<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#ffffff"/>
  
  <!-- Logo text "k." -->
  <text x="16" y="20" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900" 
        text-anchor="middle" fill="url(#logoGradient)">k.</text>
  
  <!-- Subtle shadow effect -->
  <text x="16.5" y="20.5" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900" 
        text-anchor="middle" fill="rgba(0,0,0,0.1)" opacity="0.3">k.</text>
</svg>